<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Isabelle Anno</title>
    <meta name="author" content="Alvaro Trigo Lopez" />
    <meta
      name="description"
      content="react-fullpage.js. Official React.js component for fullPage.js. An easy to use wrapper for your react application."
    />
    <meta
      name="keywords"
      content="fullpage, react wrapper,react.js,react-fullpage,react-component,adapter,component,react,sections,slides,scrolling,snap,snapping,scroll"
    />
    <meta name="Resource-type" content="Document" />

    <!-- fullpage.js stylesheet -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://unpkg.com/fullpage.js/dist/fullpage.min.css"
    />
    <!--Custom CSS-->
    <link rel="stylesheet" href="../src/css/styles.css" />
    <!--Favicons-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicons/favicon-16x16.png"
    />

    <!-- Bootstrap CSS-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />

    <!--Google Fonts. Quick reference: https://fonts.google.com/ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300&family=Roboto+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex justify-content-center align-items-center">
    <!--Loader Start. This loader is to display a blank pink page for a split second to hide weird rendering that occurs otherwise.-->

    <div id="loader"></div>

    <!--Loader end-->
    <!--Header start-->
    <div id="header" class="d-none">
      <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
          <img src="favicons/Initials.svg" alt="Isabelle Anno" />
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="https://isabelleanno.com/#s2/1"
                  >About</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="https://isabelleanno.com/#s4"
                  >Resumé</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="https://isabelleanno.com/#s5"
                  >Projects</a
                >
              </li>

              <li class="nav-item">
                <a class="nav-link" href="https://isabelleanno.com/#s6"
                  >Reviews</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="https://isabelleanno.com/#s8"
                  >Contact</a
                >
              </li>
              <li class="nav-item align-self-center">
                <div class="btn-group">
                  <i
                    type="button"
                    class="fa fa-gear dropdown-toggle"
                    id="dropdownMenuClickableInside"
                    data-bs-toggle="dropdown"
                    data-bs-auto-close="outside"
                    aria-expanded="false"
                  >
                  </i>
                  <ul class="dropdown-menu dropdown-menu-end" id="dropdownMenu">
                    <li class="dropdown-item">
                      <i class="fa-regular fa-eye"></i>
                      <p class="m-0 mx-3">High Contrast</p>
                      <label class="switch">
                        <input type="checkbox" />
                        <span class="slider"></span>
                      </label>
                    </li>
                    <li class="dropdown-item" type="button">
                      <i class="fa-regular fa-moon"></i>
                      <p class="m-0">Dark Mode</p>
                      <label class="switch">
                        <input type="checkbox" />
                        <span class="slider"></span>
                      </label>
                    </li>
                    <li class="dropdown-item" type="button">
                      <i class="fa-solid fa-ellipsis me-3"></i>
                      <p class="m-0">Horizontal Nav</p>
                      <label class="switch">
                        <input type="checkbox" id="horizNav" checked="true" />
                        <span class="slider"></span>
                      </label>
                    </li>
                    <li class="dropdown-item" type="button">
                      <i class="fa-solid fa-ellipsis-vertical"></i>
                      <p class="m-0">Vertical Nav</p>
                      <label class="switch">
                        <input type="checkbox" id="vertNav" checked="true" />
                        <span class="slider"></span>
                      </label>
                    </li>
                  </ul>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
    <!--Header End-->
    <div id="react-root"></div>
  </body>
  <!--Font Awesome-->
  <script
    src="https://kit.fontawesome.com/1557300bb3.js"
    crossorigin="anonymous"
  ></script>
  <script src="./src/index.js" type="text/JSX" defer></script>
</html>
