<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic form</title>
    <style>
      label {
        font-weight: bold;
        color: #300acc;
      }
    </style>
  </head>
  <body>
    <!--Script 2.1 - form.html -->
    <form action="handle-form.php" method="post">
      <fieldset>
        <legend>Enter your information in the form below:</legend>
        <p>
          <label>Name: </label>
          <input type="text" name="name" size="20" maxlegnth="40" />
        </p>
        <p>
          <label>Email Address: </label>
          <input type="email" name="email" size="40" maxlegnth="60" />
        </p>
        <p>
          <label>Gender:</label>
          <input type="radio" name="gender" value="M" />Male
          <input type="radio" name="gender" value="F" />Female
        </p>
        <p>
          <label
            >Age:
            <select name="age">
              <option value="0-29">Under 30</option>
              <option value="30-60">Between 30 and 60</option>
              <option value="60+">Over 60</option>
            </select>
          </label>
        </p>
        <p>
          <label
            >Comments: <textarea name="comments" rows="3" cols="40"></textarea>
          </label>
        </p>
      </fieldset>
      <p align="center">
        <input type="submit" name="submit" value="Submit my information" />
      </p>
    </form>
  </body>
</html>
